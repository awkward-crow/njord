on:
  push:
  pull_request:

name: Check README

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install knitr
        run: Rscript --no-init-file -e "install.packages('knitr', repos = 'https://cloud.r-project.org')"

      - name: Knit README
        run: Rscript --no-init-file -e "knitr::knit('README.Rmd', output = 'README.md.new', quiet = TRUE)"

      - name: Check sync
        run: |
          if ! diff -q README.md README.md.new > /dev/null 2>&1; then
            echo "README.md is out of sync with README.Rmd."
            echo "Run devtools::build_readme() and commit the result."
            diff README.md README.md.new
            exit 1
          fi
